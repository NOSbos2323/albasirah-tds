# Cloudflare Worker configuration
# يستخدم Workers + Static Assets (النهج الحديث البديل لـ Pages)

name = "albasirah-tds"
main = "src/index.js"
compatibility_date = "2024-09-25"

# Static Assets — يخدم كل ملفات public/ كـ static
[assets]
directory = "./public"
binding = "ASSETS"

# ملاحظة: env.ASSETS.fetch() يستخدم لقراءة static files من Worker

[vars]
ENVIRONMENT = "production"
